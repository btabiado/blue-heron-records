<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Blue Heron Records</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://*.supabase.co; media-src 'self' https://*.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self' https://*.supabase.co; base-uri 'none'; frame-ancestors 'none'" />

  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Design tokens ─────────────────────────────────────────── */
    :root {
      --bg:     #070b1c;
      --bg2:    #0d1430;
      --bg3:    #111a3a;
      --ink:    #f3f7ef;
      --muted:  #9aa6bd;
      --line:   #23304f;
      --accent: #6f93b0; /* default: navy */
      --radius: 12px;
      --radius-lg: 20px;
      --font-head: 'Fraunces', Georgia, serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    /* Per-theme accent colour */
    [data-theme="navy"]    { --accent: #6f93b0; }
    [data-theme="whiskey"] { --accent: #c8862f; }
    [data-theme="vintage"] { --accent: #b98a5e; }
    [data-theme="forest"]  { --accent: #5b8f6e; }
    [data-theme="rose"]    { --accent: #c97b8e; }
    [data-theme="mono"]    { --accent: #9aa6bd; }

    /* ── Reset / base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      line-height: 1.65;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 3px;
    }

    img { display: block; max-width: 100%; height: auto; }

    /* ── Top bar ───────────────────────────────────────────────── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(7, 11, 28, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 clamp(1rem, 4vw, 2.5rem);
    }

    .topbar-inner {
      max-width: 960px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand-link {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-family: var(--font-head);
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .brand-link:hover { text-decoration: none; color: var(--ink); opacity: 0.85; }

    .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .topbar-booking {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 5px 14px;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
    }
    .topbar-booking:hover {
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
    }

    /* ── Main content ──────────────────────────────────────────── */
    main {
      flex: 1;
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: clamp(2rem, 6vw, 4rem) clamp(1rem, 4vw, 2.5rem);
    }

    /* ── Loading / error states ────────────────────────────────── */
    #state-loading,
    #state-error {
      display: none;
      text-align: center;
      padding: 5rem 1rem;
    }
    #state-loading.visible,
    #state-error.visible {
      display: block;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-heading {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .state-sub {
      font-size: 0.95rem;
      color: var(--muted);
    }

    /* ── Artist content (hidden until loaded) ──────────────────── */
    #artist-content { display: none; }
    #artist-content.visible { display: block; }

    /* ── Hero section ──────────────────────────────────────────── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1.5rem;
      margin-bottom: 3.5rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--line);
    }

    .hero-photo-wrap {
      position: relative;
      width: clamp(180px, 40vw, 260px);
      flex-shrink: 0;
    }

    /* Accent glow behind photo */
    .hero-photo-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: 0.22;
      filter: blur(14px);
      pointer-events: none;
    }

    .hero-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 2px solid color-mix(in srgb, var(--accent) 40%, transparent);
      box-shadow: 0 8px 40px rgba(0,0,0,0.55);
      position: relative;
    }

    /* Placeholder when no photo */
    .hero-photo-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: var(--bg3);
      border: 2px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      position: relative;
    }

    .hero-text { max-width: 600px; }

    .hero-eyebrow {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .hero-name {
      font-family: var(--font-head);
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 900;
      line-height: 1.05;
      color: var(--ink);
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }

    .hero-tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
    }

    /* Desktop: side-by-side */
    @media (min-width: 640px) {
      .hero {
        flex-direction: row;
        text-align: left;
        align-items: center;
        gap: 2.5rem;
      }
      .hero-photo-wrap {
        width: clamp(180px, 25vw, 240px);
      }
      .hero-text { flex: 1; }
    }

    /* ── Section headings ──────────────────────────────────────── */
    .section-heading {
      font-family: var(--font-head);
      font-size: clamp(1.3rem, 3.5vw, 1.75rem);
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--line);
    }

    /* ── Bio ───────────────────────────────────────────────────── */
    .bio-section {
      margin-bottom: 3rem;
    }

    .bio-section p {
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      color: var(--ink);
      margin-bottom: 1em;
      line-height: 1.75;
      max-width: 70ch;
    }
    .bio-section p:last-child { margin-bottom: 0; }

    /* ── Music / Tracks ────────────────────────────────────────── */
    .music-section {
      margin-bottom: 3rem;
    }

    .track-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .track-item {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      transition: border-color 0.18s;
    }
    .track-item:hover { border-color: var(--accent); }

    .track-title {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.6rem;
    }

    .track-audio {
      width: 100%;
      height: 36px;
      border-radius: 6px;
      accent-color: var(--accent);
    }
    /* Style the audio control wrapper */
    .track-audio::-webkit-media-controls-panel {
      background: var(--bg3);
    }

    /* ── Links / chips ─────────────────────────────────────────── */
    .links-section {
      margin-bottom: 3rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 1.1rem;
      border: 1px solid var(--accent);
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent);
      background: transparent;
      transition: background 0.18s, color 0.18s, transform 0.12s;
    }
    .chip:hover {
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      transform: translateY(-1px);
    }

    .chip-icon {
      width: 14px;
      height: 14px;
      opacity: 0.85;
      flex-shrink: 0;
    }

    /* ── Gallery ───────────────────────────────────────────────── */
    .gallery-section {
      margin-bottom: 3rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }

    .gallery-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      transition: opacity 0.18s, transform 0.18s;
    }
    .gallery-img:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    /* ── Footer ────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--line);
      background: var(--bg2);
      padding: 2rem clamp(1rem, 4vw, 2.5rem);
      text-align: center;
    }

    .footer-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .footer-family {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-home {
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer-home:hover { color: var(--ink); }

    .footer-book {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 5px 16px;
      transition: background 0.18s, color 0.18s;
    }
    .footer-book:hover {
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── Utility ───────────────────────────────────────────────── */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Reduced motion ────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body data-theme="navy">

  <!-- Top bar -->
  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <a href="/" class="brand-link" aria-label="Blue Heron Records — Home">
        <img src="images/favicon-32.png" alt="" class="brand-logo" width="30" height="30" aria-hidden="true" />
        <span>Blue Heron Records</span>
      </a>
      <a href="/#contact" class="topbar-booking">Booking</a>
    </div>
  </header>

  <!-- Main -->
  <main id="main" role="main">

    <!-- Loading -->
    <div id="state-loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <p class="state-heading">Loading artist&hellip;</p>
    </div>

    <!-- Error / Not Found -->
    <div id="state-error" role="alert" aria-live="assertive">
      <p class="state-heading" id="error-heading">Artist not found</p>
      <p class="state-sub" id="error-sub">We couldn&rsquo;t find that artist profile.</p>
      <p style="margin-top:1.5rem;">
        <a href="/" style="color:var(--accent);font-weight:600;">&larr; Back to Blue Heron Records</a>
      </p>
    </div>

    <!-- Artist content (populated by JS) -->
    <div id="artist-content" aria-label="Artist profile">

      <!-- Hero -->
      <section class="hero" id="artist-hero" aria-labelledby="artist-name"></section>

      <!-- Bio -->
      <section class="bio-section" id="artist-bio" aria-label="Biography"></section>

      <!-- Music -->
      <section class="music-section" id="artist-music" aria-label="Music" style="display:none;"></section>

      <!-- Links -->
      <section class="links-section" id="artist-links" aria-label="Links" style="display:none;"></section>

      <!-- Gallery -->
      <section class="gallery-section" id="artist-gallery" aria-label="Gallery" style="display:none;"></section>

    </div>
  </main>

  <!-- Footer -->
  <footer role="contentinfo">
    <div class="footer-inner">
      <p class="footer-family">Part of the <a href="/">Blue Heron Records</a> family</p>
      <div class="footer-actions">
        <a href="/" class="footer-home">&larr; All Artists</a>
        <a href="/#contact" class="footer-book">Book this Artist</a>
      </div>
      <p class="footer-copy">&copy; Blue Heron Records. All rights reserved.</p>
    </div>
  </footer>

  <script src="artist.js?v=2"></script>
</body>
</html>
